# Deploy containerizado completo (Coolify). O app roda migrações + seed no start,
# depois serve na porta 3000. Arquivos enviados persistem no volume `storage`.
#
# DOIS DOMÍNIOS:
#   O roteamento e os certificados (TLS/Let's Encrypt) são gerenciados pelo
#   COOLIFY. Cadastre os DOIS domínios no MESMO serviço `app` (campo Domains),
#   separados por vírgula, para o Coolify gerar um único roteador Traefik com
#   Host(retro.wiki.br) || Host(retrowiki.com.br) e um cert cobrindo ambos:
#       https://retro.wiki.br,https://retrowiki.com.br
#   NÃO adicione labels manuais de Traefik aqui: elas criam roteadores
#   concorrentes com os do Coolify e quebram o domínio secundário (cert default
#   + 503). O Coolify injeta as labels corretas a partir do campo Domains.
#   - APP_URL deve ser o domínio canônico (usado em links absolutos/e-mails/OG).
#   - Como auth usa trustHost, os cookies/callbacks seguem o domínio acessado.
#   - No Google Cloud, cadastre o callback dos DOIS domínios:
#       https://retro.wiki.br/api/auth/callback/google
#       https://retrowiki.com.br/api/auth/callback/google
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      # Domínio canônico (um dos dois) — usado em URLs absolutas.
      APP_URL: ${APP_URL:-https://retro.wiki.br}
      # Deploy opcional em subdiretório; vazio para subdomínio.
      BASE_PATH: ${BASE_PATH:-}
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      AUTH_SECRET: ${AUTH_SECRET}
      CAPTCHA_SECRET: ${CAPTCHA_SECRET}
      STORAGE_DIR: /app/storage
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      CRON_SECRET: ${CRON_SECRET:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-RetroWiki <noreply@localhost>}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
      # Login com Google (OAuth) — opcional.
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      # BunnyCDN (uploads de imagem) — opcional; sem isso usa o storage local.
      BUNNY_STORAGE_KEY: ${BUNNY_STORAGE_KEY:-}
      BUNNY_STORAGE_KEY_READONLY: ${BUNNY_STORAGE_KEY_READONLY:-}
      BUNNY_STORAGE_REGION: ${BUNNY_STORAGE_REGION:-}
      BUNNY_PULL_ZONE: ${BUNNY_PULL_ZONE:-}
      BUNNY_CDN_TOKEN: ${BUNNY_CDN_TOKEN:-}
      BUNNY_CDN_URL: ${BUNNY_CDN_URL:-}
    volumes:
      - storage:/app/storage
    expose:
      - "3000"
    # Sem labels de Traefik aqui — o roteamento dos dois domínios e os certs são
    # gerenciados pelo Coolify (campo Domains do serviço `app`). Labels manuais
    # criavam um roteador concorrente que deixava o secundário com cert default
    # + 503.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 3s
      retries: 10

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  storage:
  mysql_data:
