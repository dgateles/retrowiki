# Deploy containerizado completo (Coolify). O app roda migrações + seed no start,
# depois serve na porta 3000. Arquivos enviados persistem no volume `storage`.
#
# DOIS DOMÍNIOS:
#   As labels do Traefik abaixo roteiam retro.wiki.br e retrowiki.com.br para o
#   app (TLS + redireciono http→https). Os domínios têm DEFAULT embutido, então
#   funcionam mesmo sem DOMAIN_PRIMARY/DOMAIN_SECONDARY definidos no Coolify;
#   defina essas variáveis só se quiser sobrescrever os domínios padrão.
#   - APP_URL deve ser o domínio canônico (usado em links absolutos/e-mails/OG).
#   - Como auth usa trustHost, os cookies/callbacks seguem o domínio acessado.
#   - No Google Cloud, cadastre o callback dos DOIS domínios:
#       https://DOMAIN_PRIMARY/api/auth/callback/google
#       https://DOMAIN_SECONDARY/api/auth/callback/google
#   (No Coolify, deixe o campo "Domains" do recurso vazio para não duplicar as
#    labels — o roteamento é feito por estas labels do compose.)
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      # Domínio canônico (um dos dois) — usado em URLs absolutas.
      APP_URL: ${APP_URL:-https://retro.wiki.br}
      # Deploy opcional em subdiretório; vazio para subdomínio.
      BASE_PATH: ${BASE_PATH:-}
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      AUTH_SECRET: ${AUTH_SECRET}
      CAPTCHA_SECRET: ${CAPTCHA_SECRET}
      STORAGE_DIR: /app/storage
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      CRON_SECRET: ${CRON_SECRET:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-RetroWiki <noreply@localhost>}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
      # Login com Google (OAuth) — opcional.
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      # BunnyCDN (uploads de imagem) — opcional; sem isso usa o storage local.
      BUNNY_STORAGE_KEY: ${BUNNY_STORAGE_KEY:-}
      BUNNY_STORAGE_KEY_READONLY: ${BUNNY_STORAGE_KEY_READONLY:-}
      BUNNY_STORAGE_REGION: ${BUNNY_STORAGE_REGION:-}
      BUNNY_PULL_ZONE: ${BUNNY_PULL_ZONE:-}
      BUNNY_CDN_TOKEN: ${BUNNY_CDN_TOKEN:-}
      BUNNY_CDN_URL: ${BUNNY_CDN_URL:-}
    volumes:
      - storage:/app/storage
    expose:
      - "3000"
    labels:
      - "traefik.enable=true"
      # Roteador HTTPS para os DOIS domínios. Defaults garantem que o secundário
      # seja roteado mesmo que DOMAIN_SECONDARY não esteja definido no Coolify.
      - "traefik.http.routers.retrowiki.rule=Host(`${DOMAIN_PRIMARY:-retro.wiki.br}`) || Host(`${DOMAIN_SECONDARY:-retrowiki.com.br}`)"
      - "traefik.http.routers.retrowiki.entrypoints=https"
      - "traefik.http.routers.retrowiki.tls=true"
      - "traefik.http.routers.retrowiki.tls.certresolver=letsencrypt"
      - "traefik.http.routers.retrowiki.service=retrowiki"
      - "traefik.http.services.retrowiki.loadbalancer.server.port=3000"
      # Roteador HTTP → redireciona para HTTPS (os dois domínios).
      - "traefik.http.routers.retrowiki-http.rule=Host(`${DOMAIN_PRIMARY:-retro.wiki.br}`) || Host(`${DOMAIN_SECONDARY:-retrowiki.com.br}`)"
      - "traefik.http.routers.retrowiki-http.entrypoints=http"
      - "traefik.http.routers.retrowiki-http.middlewares=retrowiki-redirect"
      - "traefik.http.middlewares.retrowiki-redirect.redirectscheme.scheme=https"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 3s
      retries: 10

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  storage:
  mysql_data:
